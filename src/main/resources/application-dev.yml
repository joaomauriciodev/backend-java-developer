spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/tvshow
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  main:
    allow-circular-references: true
  cache:
    caffeine:
      expire-after-write-minutes: 10
      maximum-size: 500

tvmaze:
  client:
    connect-timeout: 3000
    read-timeout: 5000

resilience4j:
  retry:
    instances:
      tvmaze:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException

app:
  jwt:
    issuer: example-auth
    expiration-minutes: 120
    secret: "MWLjptNgkVeEoxNvuv9reWr3i6EjPk1dOg1dJ+XOhYccqSSpoiWdDpMKDOndNtF/"

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
